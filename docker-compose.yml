services:
  publisher-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: publisher-db
    ports:
      - "1451:1433"
    environment:
      SA_PASSWORD: "P@ssw0rd"
      ACCEPT_EULA: "Y"
      MSSQL_AGENT_ENABLED: "true"
    volumes:
      - publisher_data:/var/opt/mssql
    networks:
      - replication
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 200M

  subscriber-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: subscriber-db
    ports:
      - "1452:1433"
    environment:
      SA_PASSWORD: "P@ssw0rd"
      ACCEPT_EULA: "Y"
      MSSQL_AGENT_ENABLED: "true"
    volumes:
      - subscriber_data:/var/opt/mssql
    networks:
      - replication

  # distributor-db:
  #   image: mcr.microsoft.com/mssql/server:2022-latest
  #   container_name: distributor-db
  #   ports:
  #     - "1453:1433"
  #   environment:
  #     SA_PASSWORD: "P@ssw0rd"
  #     ACCEPT_EULA: "Y"
  #     MSSQL_AGENT_ENABLED: "true"
  #   volumes:
  #     - distributor_data:/var/opt/mssql
  #   networks:
  #     - replication

networks:
  replication:
    driver: bridge

volumes:
  publisher_data:
  subscriber_data:
  # distributor_data:
